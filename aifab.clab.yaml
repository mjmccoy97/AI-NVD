name: aifab
prefix: __lab-name
mgmt:
  network: mgmt
  ipv4-subnet: 172.21.21.0/24
topology:
  defaults:
    kind: nokia_srlinux
  kinds:
    nokia_srlinux:
      image: ghcr.io/nokia/srlinux:25.10.1
      startup-config: configs/srlinux/__clabNodeName__.cfg
      type: ixr-h4
    linux:
      image: aninchat/ubuntu-server:v1
      binds:
        - configs:/linux
  nodes:
    spine1:
      mgmt-ipv4: 172.21.21.101
    spine2:
      mgmt-ipv4: 172.21.21.102
    stripe1-leaf1:
      mgmt-ipv4: 172.21.21.11
      labels:
        graph-level: 2
        graph-icon: network
    stripe1-leaf2:
      mgmt-ipv4: 172.21.21.12
      labels:
        graph-level: 2
        graph-icon: network
    stripe1-leaf3:
      mgmt-ipv4: 172.21.21.13
      labels:
        graph-level: 2
        graph-icon: network
    stripe1-leaf4:
      mgmt-ipv4: 172.21.21.14
      labels:
        graph-level: 2
        graph-icon: network
    stripe1-leaf5:
      mgmt-ipv4: 172.21.21.15
      labels:
        graph-level: 2
        graph-icon: network
    stripe1-leaf6:
      mgmt-ipv4: 172.21.21.16
      labels:
        graph-level: 2
        graph-icon: network
    stripe1-leaf7:
      mgmt-ipv4: 172.21.21.17
      labels:
        graph-level: 2
        graph-icon: network
    stripe1-leaf8:
      mgmt-ipv4: 172.21.21.18
      labels:
        graph-level: 2
        graph-icon: network
    stripe2-leaf1:
      kind: nokia_srlinux
      mgmt-ipv4: 172.21.21.21
      type: ixr-h5-64d
      labels:
        graph-level: 2
        graph-icon: network
    stripe2-leaf2:
      kind: nokia_srlinux
      mgmt-ipv4: 172.21.21.22
      type: ixr-h5-64d
      labels:
        graph-level: 2
        graph-icon: network
    stripe2-leaf3:
      kind: nokia_srlinux
      mgmt-ipv4: 172.21.21.23
      type: ixr-h5-64d
      labels:
        graph-level: 2
        graph-icon: network
    stripe2-leaf4:
      kind: nokia_srlinux
      mgmt-ipv4: 172.21.21.24
      type: ixr-h5-64d
      labels:
        graph-level: 2
        graph-icon: network
    stripe2-leaf5:
      kind: nokia_srlinux
      mgmt-ipv4: 172.21.21.25
      type: ixr-h5-64d
      labels:
        graph-level: 2
        graph-icon: network
    stripe2-leaf6:
      kind: nokia_srlinux
      mgmt-ipv4: 172.21.21.26
      type: ixr-h5-64d
      labels:
        graph-level: 2
        graph-icon: network
    stripe2-leaf7:
      kind: nokia_srlinux
      mgmt-ipv4: 172.21.21.27
      type: ixr-h5-64d
      labels:
        graph-level: 2
        graph-icon: network
    stripe2-leaf8:
      kind: nokia_srlinux
      mgmt-ipv4: 172.21.21.28
      type: ixr-h5-64d
      labels:
        graph-level: 2
        graph-icon: network
    frontend-spine1:
      kind: nokia_srlinux
      mgmt-ipv4: 172.21.21.31
      type: ixr-h5-64o
      labels:
        graph-level: 1
        graph-icon: network
    frontend-spine2:
      kind: nokia_srlinux
      mgmt-ipv4: 172.21.21.32
      type: ixr-h5-64o
      labels:
        graph-level: 1
        graph-icon: network
    frontend-leaf1:
      kind: nokia_srlinux
      mgmt-ipv4: 172.21.21.33
      type: ixr-d5
      labels:
        graph-level: 2
        graph-icon: network
    frontend-leaf2:
      kind: nokia_srlinux
      mgmt-ipv4: 172.21.21.34
      type: ixr-d5
      labels:
        graph-level: 2
        graph-icon: network
    s1:
      mgmt-ipv4: 172.21.21.51
      kind: linux
      exec:
        - bash linux/s1.sh
    s2:
      mgmt-ipv4: 172.21.21.52
      kind: linux
      exec:
        - bash linux/s2.sh
    s3:
      mgmt-ipv4: 172.21.21.53
      kind: linux
      exec:
        - bash linux/s3.sh
    s4:
      mgmt-ipv4: 172.21.21.54
      kind: linux
      exec:
        - bash linux/s4.sh
    weka1:
      mgmt-ipv4: 172.21.21.60
      kind: linux
      exec:
        - bash linux/weka1.sh
    weka2:
      mgmt-ipv4: 172.21.21.61
      kind: linux
      exec:
        - bash linux/weka2.sh
    weka3:
      mgmt-ipv4: 172.21.21.63
      kind: linux
      exec:
        - bash linux/weka3.sh
    weka4:
      mgmt-ipv4: 172.21.21.64
      kind: linux
      exec:
        - bash linux/weka4.sh
    weka5:
      mgmt-ipv4: 172.21.21.65
      kind: linux
      exec:
        - bash linux/weka5.sh
    weka6:
      mgmt-ipv4: 172.21.21.66
      kind: linux
      exec:
        - bash linux/weka6.sh
    weka7:
      mgmt-ipv4: 172.21.21.67
      kind: linux
      exec:
        - bash linux/weka7.sh
    weka8:
      mgmt-ipv4: 172.21.21.68
      kind: linux
      exec:
        - bash linux/weka8.sh
    #TELEMETRY STACK
    gnmic:
      kind: linux
      image: ghcr.io/openconfig/gnmic:0.39.1
      binds:
        - configs/gnmic/gnmic-config.yml:/gnmic-config.yml:ro
      cmd: --config /gnmic-config.yml --log subscribe
      group: '10'
    prometheus:
      kind: linux
      image: quay.io/prometheus/prometheus:v2.54.1
      binds:
        - configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      cmd: --config.file=/etc/prometheus/prometheus.yml
      ports:
        - 9090:9090
      group: '10'
    grafana:
      kind: linux
      image: grafana-custom:12.3.2
      binds:
        - configs/grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yaml:ro
        - configs/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
        - configs/grafana/dashboards:/var/lib/grafana/dashboards
        - configs/grafana/dashboards/Nokia_Logo.svg:/usr/share/grafana/public/build/img/icons/marker/Nokia_Logo.svg:ro
      ports:
        - 3000:3000
      env:
        GF_ORG_ROLE: Admin
        GF_ORG_NAME: Main Org
        GF_AUTH_ANONYMOUS_ENABLED: "true"
        GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
        GF_AUTH_ANONYMOUS: "true"
        GF_AUTH_OAUTH_AUTO_LOGIN: "true"
      group: '10'
    promtail:
      kind: linux
      image: grafana/promtail:3.2.0
      binds:
        - configs/promtail:/etc/promtail
      cmd: --config.file=/etc/promtail/promtail-config.yml
      ports:
        - 9080:9080
    loki:
      kind: linux
      image: grafana/loki:3.2.0
      binds:
        - configs/loki:/etc/loki
      cmd: --config.file=/etc/loki/loki-config.yml
      ports:
        - 3100:3100
  links:
    - endpoints: [ 'stripe1-leaf1:e1-1', 'spine1:e1-1' ]
    - endpoints: [ 'stripe1-leaf1:e1-2', 'spine2:e1-1' ]
