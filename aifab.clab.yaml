    - endpoints: [ 's3:eth9', 'frontend-leaf1:e1-5' ]
    - endpoints: [ 's3:eth10', 'frontend-leaf2:e1-5' ]
    - endpoints: [ 's4:eth9', 'frontend-leaf1:e1-6' ]
    - endpoints: [ 's4:eth10', 'frontend-leaf2:e1-6' ]
    # Weka servers to frontend/storage fabric connectivity
    - endpoints: [ 'weka1:eth1', 'frontend-leaf1:e1-7' ]
    - endpoints: [ 'weka1:eth2', 'frontend-leaf2:e1-7' ]
    - endpoints: [ 'weka2:eth1', 'frontend-leaf1:e1-8' ]
    - endpoints: [ 'weka2:eth2', 'frontend-leaf2:e1-8' ]
    - endpoints: [ 'weka3:eth1', 'frontend-leaf1:e1-9' ]
    - endpoints: [ 'weka3:eth2', 'frontend-leaf2:e1-9' ]
    - endpoints: [ 'weka4:eth1', 'frontend-leaf1:e1-10' ]
    - endpoints: [ 'weka4:eth2', 'frontend-leaf2:e1-10' ]
    - endpoints: [ 'weka5:eth1', 'frontend-leaf1:e1-11' ]
