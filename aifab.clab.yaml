name: aifab
prefix: __lab-name
mgmt:
  network: mgmt
  ipv4-subnet: 172.21.21.0/24
topology:
  defaults:
    kind: nokia_srlinux
  kinds:
    nokia_srlinux:
      image: ghcr.io/nokia/srlinux:25.10.1
      startup-config: configs/srlinux/__clabNodeName__.cfg
    linux:
      image: aninchat/ubuntu-server:v1
      binds:
        - configs/linux:/linux
  nodes:
  #### NETWORK STACK ###
  #### BACKEND SPINES are IXR-H4 ####
    spine1:
      mgmt-ipv4: 172.21.21.101
      type: ixr-h4
    spine2:
      mgmt-ipv4: 172.21.21.102
      type: ixr-h4
  #### BACKEND LEAFS are IXR-H4 ####
    stripe1-leaf1:
      mgmt-ipv4: 172.21.21.11
      type: ixr-h4
      labels:
        graph-level: 2
        graph-icon: network
    stripe1-leaf2:
      mgmt-ipv4: 172.21.21.12
      type: ixr-h4
      labels:
        graph-level: 2
        graph-icon: network
    stripe1-leaf3:
      mgmt-ipv4: 172.21.21.13
      type: ixr-h4
      labels:
        graph-level: 2
        graph-icon: network
    stripe1-leaf4:
      mgmt-ipv4: 172.21.21.14
      type: ixr-h4
      labels:
        graph-level: 2
        graph-icon: network
    stripe1-leaf5:
      mgmt-ipv4: 172.21.21.15
      type: ixr-h4
      labels:
        graph-level: 2
        graph-icon: network
    stripe1-leaf6:
      mgmt-ipv4: 172.21.21.16
      type: ixr-h4
      labels:
        graph-level: 2
        graph-icon: network
    stripe1-leaf7:
      mgmt-ipv4: 172.21.21.17
      type: ixr-h4
      labels:
        graph-level: 2
        graph-icon: network
    stripe1-leaf8:
      mgmt-ipv4: 172.21.21.18
      type: ixr-h4
      labels:
        graph-level: 2
        graph-icon: network
    stripe2-leaf1:
      kind: nokia_srlinux
      mgmt-ipv4: 172.21.21.21
      type: ixr-h5-64d
      labels:
        graph-level: 2
        graph-icon: network
    #### LEAFS for BACKEND STRIPE2 are IXR-H5-64D ###
    stripe2-leaf2:
      kind: nokia_srlinux
      mgmt-ipv4: 172.21.21.22
      type: ixr-h5-64d
      labels:
        graph-level: 2
        graph-icon: network
    stripe2-leaf3:
      kind: nokia_srlinux
      mgmt-ipv4: 172.21.21.23
      type: ixr-h5-64d
      labels:
        graph-level: 2
        graph-icon: network
    stripe2-leaf4:
      kind: nokia_srlinux
      mgmt-ipv4: 172.21.21.24
      type: ixr-h5-64d
      labels:
        graph-level: 2
        graph-icon: network
    stripe2-leaf5:
      kind: nokia_srlinux
      mgmt-ipv4: 172.21.21.25
      type: ixr-h5-64d
      labels:
        graph-level: 2
        graph-icon: network
    stripe2-leaf6:
      kind: nokia_srlinux
      mgmt-ipv4: 172.21.21.26
      type: ixr-h5-64d
      labels:
        graph-level: 2
        graph-icon: network
    stripe2-leaf7:
      kind: nokia_srlinux
      mgmt-ipv4: 172.21.21.27
      type: ixr-h5-64d
      labels:
        graph-level: 2
        graph-icon: network
    stripe2-leaf8:
      kind: nokia_srlinux
      mgmt-ipv4: 172.21.21.28
      type: ixr-h5-64d
      labels:
        graph-level: 2
        graph-icon: network
    #### FRONTEND SPINES are IXR-H5-64o ###
    frontend-spine1:
      kind: nokia_srlinux
      mgmt-ipv4: 172.21.21.31
      type: ixr-h5-64o
      labels:
        graph-level: 1
        graph-icon: network
    frontend-spine2:
      kind: nokia_srlinux
      mgmt-ipv4: 172.21.21.32
      type: ixr-h5-64o
      labels:
        graph-level: 1
        graph-icon: network
    #### FRONTEND LEAFS are IXR-D5 ###
    frontend-leaf1:
      kind: nokia_srlinux
      mgmt-ipv4: 172.21.21.33
      type: ixr-d5
      labels:
        graph-level: 2
        graph-icon: network
    frontend-leaf2:
      kind: nokia_srlinux
      mgmt-ipv4: 172.21.21.34
      type: ixr-d5
      labels:
        graph-level: 2
        graph-icon: network
    
    ### STORAGE STACK ###
    s1:
      mgmt-ipv4: 172.21.21.51
      kind: linux
      exec:
        - bash linux/s1.sh
    s2:
      mgmt-ipv4: 172.21.21.52
      kind: linux
      exec:
        - bash linux/s2.sh
    s3:
      mgmt-ipv4: 172.21.21.53
      kind: linux
      exec:
        - bash linux/s3.sh
    s4:
      mgmt-ipv4: 172.21.21.54
      kind: linux
      exec:
        - bash linux/s4.sh
    ### COMPUTE STACK ###
    weka1:
      mgmt-ipv4: 172.21.21.60
      kind: linux
      exec:
        - bash linux/weka1.sh
    weka2:
      mgmt-ipv4: 172.21.21.61
      kind: linux
      exec:
        - bash linux/weka2.sh
    weka3:
      mgmt-ipv4: 172.21.21.63
      kind: linux
      exec:
        - bash linux/weka3.sh
    weka4:
      mgmt-ipv4: 172.21.21.64
      kind: linux
      exec:
        - bash linux/weka4.sh
    weka5:
      mgmt-ipv4: 172.21.21.65
      kind: linux
      exec:
        - bash linux/weka5.sh
    weka6:
      mgmt-ipv4: 172.21.21.66
      kind: linux
      exec:
        - bash linux/weka6.sh
    weka7:
      mgmt-ipv4: 172.21.21.67
      kind: linux
      exec:
        - bash linux/weka7.sh
    weka8:
      mgmt-ipv4: 172.21.21.68
      kind: linux
      exec:
        - bash linux/weka8.sh
    ### TELEMETRY STACK FPOR PHASE 2###
    gnmic:
      kind: linux
      mgmt-ipv4: 172.21.21.70
      image: ghcr.io/openconfig/gnmic:0.39.1
      binds:
        - configs/gnmic/gnmic-config.yml:/gnmic-config.yml:ro
      cmd: --config /gnmic-config.yml --log subscribe
      group: '10'
    
    prometheus:
      kind: linux
      mgmt-ipv4: 172.21.21.71
      image: quay.io/prometheus/prometheus:v2.54.1
      binds:
        - configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      cmd: --config.file=/etc/prometheus/prometheus.yml
      ports:
        - 9090:9090
      group: '10'
    
    grafana:
      kind: linux
      mgmt-ipv4: 172.21.21.72
      image: grafana/grafana:12.3.2
      binds:
        - configs/grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yaml:ro
        - configs/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
        - configs/grafana/dashboards:/var/lib/grafana/dashboards
        - configs/grafana/dashboards/Nokia_Logo.svg:/usr/share/grafana/public/build/img/icons/marker/Nokia_Logo.svg:ro
      ports:
        - 3000:3000
      env:
        GF_INSTALL_PLUGINS: "andrewbmchugh-flow-panel" 
        GF_ORG_ROLE: Admin
        GF_ORG_NAME: Main Org
        GF_AUTH_ANONYMOUS_ENABLED: "true"
        GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
        GF_AUTH_ANONYMOUS: "true"
        GF_AUTH_OAUTH_AUTO_LOGIN: "true"
      group: '10'
    ### LOGGING STACK ###
    promtail:
      kind: linux
      mgmt-ipv4: 172.21.21.73
      image: grafana/promtail:3.2.0
      binds:
        - configs/promtail:/etc/promtail
      cmd: --config.file=/etc/promtail/promtail-config.yml
      ports:
        - 9080:9080
    
    loki:
      kind: linux
      mgmt-ipv4: 172.21.21.74
      image: grafana/loki:3.2.0
      binds:
        - configs/loki:/etc/loki
      cmd: --config.file=/etc/loki/loki-config.yml
      ports:
        - 3100:3100
  links:
   # stripe leafs to spines connectivity
    - endpoints: [ 'stripe1-leaf1:e1-1', 'spine1:e1-1' ]
    - endpoints: [ 'stripe1-leaf1:e1-2', 'spine2:e1-1' ]
    - endpoints: [ 'stripe1-leaf2:e1-1', 'spine1:e1-2' ]
    - endpoints: [ 'stripe1-leaf2:e1-2', 'spine2:e1-2' ]
    - endpoints: [ 'stripe1-leaf3:e1-1', 'spine1:e1-3' ]
    - endpoints: [ 'stripe1-leaf3:e1-2', 'spine2:e1-3' ]
    - endpoints: [ 'stripe1-leaf4:e1-1', 'spine1:e1-4' ]
    - endpoints: [ 'stripe1-leaf4:e1-2', 'spine2:e1-4' ]
    - endpoints: [ 'stripe1-leaf5:e1-1', 'spine1:e1-5' ]
    - endpoints: [ 'stripe1-leaf5:e1-2', 'spine2:e1-5' ]
    - endpoints: [ 'stripe1-leaf6:e1-1', 'spine1:e1-6' ]
    - endpoints: [ 'stripe1-leaf6:e1-2', 'spine2:e1-6' ]
    - endpoints: [ 'stripe1-leaf7:e1-1', 'spine1:e1-7' ]
    - endpoints: [ 'stripe1-leaf7:e1-2', 'spine2:e1-7' ]
    - endpoints: [ 'stripe1-leaf8:e1-1', 'spine1:e1-8' ]
    - endpoints: [ 'stripe1-leaf8:e1-2', 'spine2:e1-8' ]
    - endpoints: [ 'stripe2-leaf1:e1-1', 'spine1:e1-9' ]
    - endpoints: [ 'stripe2-leaf1:e1-2', 'spine2:e1-9' ]
    - endpoints: [ 'stripe2-leaf2:e1-1', 'spine1:e1-10' ]
    - endpoints: [ 'stripe2-leaf2:e1-2', 'spine2:e1-10' ]
    - endpoints: [ 'stripe2-leaf3:e1-1', 'spine1:e1-11' ]
    - endpoints: [ 'stripe2-leaf3:e1-2', 'spine2:e1-11' ]
    - endpoints: [ 'stripe2-leaf4:e1-1', 'spine1:e1-12' ]
    - endpoints: [ 'stripe2-leaf4:e1-2', 'spine2:e1-12' ]
    - endpoints: [ 'stripe2-leaf5:e1-1', 'spine1:e1-13' ]
    - endpoints: [ 'stripe2-leaf5:e1-2', 'spine2:e1-13' ]
    - endpoints: [ 'stripe2-leaf6:e1-1', 'spine1:e1-14' ]
    - endpoints: [ 'stripe2-leaf6:e1-2', 'spine2:e1-14' ]
    - endpoints: [ 'stripe2-leaf7:e1-1', 'spine1:e1-15' ]
    - endpoints: [ 'stripe2-leaf7:e1-2', 'spine2:e1-15' ]
    - endpoints: [ 'stripe2-leaf8:e1-1', 'spine1:e1-16' ]
    - endpoints: [ 'stripe2-leaf8:e1-2', 'spine2:e1-16' ]
    # server to leaf backend connectivity
    - endpoints: [ 's1:eth1', 'stripe1-leaf1:e1-3' ]
    - endpoints: [ 's1:eth2', 'stripe1-leaf2:e1-3' ]
    - endpoints: [ 's1:eth3', 'stripe1-leaf3:e1-3' ]
    - endpoints: [ 's1:eth4', 'stripe1-leaf4:e1-3' ]
    - endpoints: [ 's1:eth5', 'stripe1-leaf5:e1-3' ]
    - endpoints: [ 's1:eth6', 'stripe1-leaf6:e1-3' ]
    - endpoints: [ 's1:eth7', 'stripe1-leaf7:e1-3' ]
    - endpoints: [ 's1:eth8', 'stripe1-leaf8:e1-3' ]
    - endpoints: [ 's2:eth1', 'stripe1-leaf1:e1-4' ]
    - endpoints: [ 's2:eth2', 'stripe1-leaf2:e1-4' ]
    - endpoints: [ 's2:eth3', 'stripe1-leaf3:e1-4' ]
    - endpoints: [ 's2:eth4', 'stripe1-leaf4:e1-4' ]
    - endpoints: [ 's2:eth5', 'stripe1-leaf5:e1-4' ]
    - endpoints: [ 's2:eth6', 'stripe1-leaf6:e1-4' ]
    - endpoints: [ 's2:eth7', 'stripe1-leaf7:e1-4' ]
    - endpoints: [ 's2:eth8', 'stripe1-leaf8:e1-4' ]
    - endpoints: [ 's3:eth1', 'stripe2-leaf1:e1-3' ]
    - endpoints: [ 's3:eth2', 'stripe2-leaf2:e1-3' ]
    - endpoints: [ 's3:eth3', 'stripe2-leaf3:e1-3' ]
    - endpoints: [ 's3:eth4', 'stripe2-leaf4:e1-3' ]
    - endpoints: [ 's3:eth5', 'stripe2-leaf5:e1-3' ]
    - endpoints: [ 's3:eth6', 'stripe2-leaf6:e1-3' ]
    - endpoints: [ 's3:eth7', 'stripe2-leaf7:e1-3' ]
    - endpoints: [ 's3:eth8', 'stripe2-leaf8:e1-3' ]
    - endpoints: [ 's4:eth1', 'stripe2-leaf1:e1-4' ]
    - endpoints: [ 's4:eth2', 'stripe2-leaf2:e1-4' ]
    - endpoints: [ 's4:eth3', 'stripe2-leaf3:e1-4' ]
