    # frontend/storage leaf-spine connectivity
    - endpoints: [ 'frontend-leaf1:e1-1', 'frontend-spine1:e1-1' ]
    - endpoints: [ 'frontend-leaf1:e1-2', 'frontend-spine2:e1-1' ]
